version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: adhd-brain-db
    environment:
      POSTGRES_DB: adhd_brain
      POSTGRES_USER: adhd
      POSTGRES_PASSWORD: adhd
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adhd -d adhd_brain"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
