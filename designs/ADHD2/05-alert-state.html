<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error": "#ee7d77",
              "surface-container-lowest": "#000000",
              "outline": "#75757b",
              "primary-dim": "#8bbfe2",
              "on-surface-variant": "#abaab1",
              "on-primary-container": "#a2d7fa",
              "surface-dim": "#0e0e10",
              "tertiary-fixed-dim": "#b5e8cd",
              "on-error": "#490106",
              "surface-container-low": "#131316",
              "secondary-fixed-dim": "#b8d7ff",
              "primary-container": "#0a4c69",
              "primary": "#99cdf0",
              "on-error-container": "#ff9993",
              "on-primary": "#004562",
              "surface-container": "#19191d",
              "inverse-primary": "#2d6483",
              "on-secondary-fixed": "#214162",
              "secondary-container": "#1d3d5e",
              "inverse-surface": "#fcf8fb",
              "error-dim": "#bb5551",
              "on-tertiary-container": "#31604b",
              "surface-bright": "#2b2c32",
              "tertiary": "#e8fff0",
              "error-container": "#7f2927",
              "tertiary-fixed": "#c3f7db",
              "surface-tint": "#99cdf0",
              "primary-fixed": "#c6e7ff",
              "secondary-fixed": "#d1e4ff",
              "on-tertiary-fixed-variant": "#3b6a55",
              "on-primary-fixed": "#004460",
              "outline-variant": "#47474d",
              "on-secondary-container": "#a3c2e9",
              "on-secondary": "#00213d",
              "on-primary-fixed-variant": "#29617f",
              "secondary-dim": "#82a0c6",
              "secondary": "#82a0c6",
              "on-tertiary": "#396853",
              "tertiary-dim": "#b5e8cd",
              "surface": "#0e0e10",
              "on-surface": "#e6e4ec",
              "surface-container-highest": "#25252b",
              "tertiary-container": "#c3f7db",
              "primary-fixed-dim": "#a7dbfe",
              "on-tertiary-fixed": "#1d4d39",
              "on-background": "#e6e4ec",
              "on-secondary-fixed-variant": "#3f5e80",
              "inverse-on-surface": "#555557",
              "background": "#0e0e10",
              "surface-variant": "#25252b",
              "surface-container-high": "#1f1f24",
              "warm-amber": "#F0D3A4"
            },
            fontFamily: {
              "headline": ["Lexend"],
              "body": ["Lexend"],
              "label": ["Lexend"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .breathing-glow {
            box-shadow: 0 0 35px 5px rgba(240, 211, 164, 0.35);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen overflow-hidden">
<!-- Top Navigation (Shell) -->
<header class="fixed top-0 w-full h-8 flex items-center px-4 bg-transparent text-slate-200 font-lexend tracking-tight text-sm antialiased z-50 justify-between">
<div class="flex items-center gap-4">
<span class="font-lexend font-bold text-slate-100">Sanctuary</span>
<nav class="hidden md:flex items-center gap-4">
<span class="text-white font-semibold cursor-default">File</span>
<span class="text-slate-400 font-normal hover:text-white transition-colors duration-200 cursor-default">Edit</span>
<span class="text-slate-400 font-normal hover:text-white transition-colors duration-200 cursor-default">View</span>
<span class="text-slate-400 font-normal hover:text-white transition-colors duration-200 cursor-default">Window</span>
<span class="text-slate-400 font-normal hover:text-white transition-colors duration-200 cursor-default">Help</span>
</nav>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[16px]">search</span>
<span class="material-symbols-outlined text-[16px]">wifi</span>
<span class="material-symbols-outlined text-[16px]">sleep</span>
<span class="material-symbols-outlined text-[16px]">battery_full</span>
</div>
</header>
<!-- Sidebar (Shell) -->
<aside class="fixed left-4 top-12 bottom-4 w-20 rounded-full bg-slate-900/80 backdrop-blur-xl flex flex-col items-center py-8 gap-6 shadow-[0_12px_40px_rgba(153,205,240,0.05)] z-40">
<div class="bg-sky-500/20 text-sky-300 rounded-full p-3 transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="target">target</span>
</div>
<div class="text-slate-500 p-3 hover:bg-slate-800/50 rounded-full transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="air">air</span>
</div>
<div class="text-slate-500 p-3 hover:bg-slate-800/50 rounded-full transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
</div>
<div class="mt-auto text-slate-500 p-3 hover:bg-slate-800/50 rounded-full transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</div>
</aside>
<!-- Main Content Canvas (The Desktop Context) -->
<main class="ml-28 p-8 pt-12 min-h-screen">
<!-- The Dynamic Island Alert State -->
<div class="flex justify-center w-full mb-12">
<div class="fixed top-1 left-1/2 -translate-x-1/2 w-[280px] h-[52px] bg-black rounded-full z-[100] breathing-glow flex items-center px-4 gap-3 transition-all duration-500">
<!-- Left Icon -->
<div class="flex-shrink-0 text-[20px]">☕</div>
<!-- Center Text Content -->
<div class="flex flex-col flex-grow leading-tight">
<h1 class="text-[13px] font-semibold text-[#E5E5E7] tracking-tight">Break time?</h1>
<p class="text-[11px] font-normal text-[#E5E5E7]/80">You've been focused for 90 min</p>
</div>
<!-- Right Actions -->
<div class="flex items-center gap-2">
<button class="bg-[#7FB3D5]/30 hover:bg-[#7FB3D5]/50 text-white px-3 py-1 rounded-full text-[10px] font-medium transition-colors">
                        Let's go
                    </button>
<button class="text-[#E5E5E7]/50 hover:text-white transition-colors">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</div>
</div>
</div>
<!-- Background Content (Simulating a focused workspace) -->
<div class="grid grid-cols-12 gap-6 mt-16 max-w-6xl mx-auto opacity-40 grayscale pointer-events-none">
<!-- Focused Project Card -->
<div class="col-span-8 p-8 rounded-lg bg-surface-container border border-outline-variant/10 min-h-[400px]">
<div class="flex items-center justify-between mb-8">
<div class="space-y-1">
<div class="h-6 w-48 bg-outline-variant/20 rounded"></div>
<div class="h-4 w-32 bg-outline-variant/10 rounded"></div>
</div>
<div class="h-10 w-10 rounded-full bg-primary/20"></div>
</div>
<div class="space-y-4">
<div class="h-4 w-full bg-outline-variant/10 rounded"></div>
<div class="h-4 w-[90%] bg-outline-variant/10 rounded"></div>
<div class="h-4 w-[95%] bg-outline-variant/10 rounded"></div>
<div class="h-4 w-[85%] bg-outline-variant/10 rounded"></div>
</div>
<!-- Asymmetric Element -->
<div class="mt-12 ml-auto w-1/2 p-6 rounded-lg bg-surface-container-high">
<div class="h-3 w-24 bg-primary/30 rounded mb-4"></div>
<div class="h-2 w-full bg-outline-variant/10 rounded"></div>
</div>
</div>
<!-- Side Bento Column -->
<div class="col-span-4 flex flex-col gap-6">
<div class="h-48 rounded-lg bg-surface-container-low border border-outline-variant/5 flex items-center justify-center">
<div class="text-center">
<div class="h-12 w-12 rounded-full bg-tertiary-dim/20 mx-auto mb-3"></div>
<div class="h-4 w-24 bg-outline-variant/20 rounded mx-auto"></div>
</div>
</div>
<div class="h-64 rounded-lg bg-primary-container/10 border border-primary/5 p-6 relative overflow-hidden">
<div class="relative z-10">
<div class="h-4 w-20 bg-primary-dim/30 rounded mb-4"></div>
<div class="space-y-2">
<div class="h-2 w-full bg-white/5 rounded"></div>
<div class="h-2 w-full bg-white/5 rounded"></div>
<div class="h-2 w-3/4 bg-white/5 rounded"></div>
</div>
</div>
<!-- Ambient Sheen -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent"></div>
</div>
</div>
</div>
<!-- Floating Abstract Geometry for Depth -->
<div class="fixed bottom-0 right-0 w-[600px] h-[600px] bg-primary/5 blur-[120px] rounded-full -mr-48 -mb-48 pointer-events-none"></div>
<div class="fixed top-1/4 left-1/4 w-[300px] h-[300px] bg-tertiary-dim/5 blur-[100px] rounded-full pointer-events-none"></div>
</main>
<!-- Bottom Dynamic Island Anchor (Minimized) -->
<div class="fixed top-1 left-1/2 -translate-x-1/2 flex items-center justify-center pointer-events-none">
<!-- The visual presence is handled by the expanded notch above -->
</div>
</body></html>
